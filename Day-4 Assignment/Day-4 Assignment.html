<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="display:flex ; align-items:center;flex-direction:column">
    <style>
        .center{
            width : 50%;
            background-color : rgb(137, 133, 133);
            display:flex ;
            flex-direction: column;
            align-items: center;

        }
    </style>
    <div class="center">
    <form action="">
        <h1>Registration form</h1>
        <label for="name">
            Name :
            <input type="text" id="name" placeholder="Enter Name" required>
        </label>
        <br>
        <label for="email">
            Email :
            <input type="email" id="email" placeholder="Enter Email" required>
        </label>
        <br>
        <label for="password">
            Password:
            <input type="password" id="password" placeholder="Enter password" required>
        </label>
        <br>
        <label for="gender">
            Gender :
            <label for="Male">
                male
                <input type="radio" name="gender" value="mail" id="male" required>
            </label>
            <label for="female">
                Female
                <input type="radio" name="gender" value="female" id="female">
            </label>
        </label>
        <br>
        <label for="hobbies">
            Hobbies :
            <select name="hobbies" id="hobbies" multiple required>
                <option value="Cricket">Cricket</option>
                <option value="football">Football</option>
                <option value="chess">Chess</option>
                <option value="Traveling">Traveling</option>
                <option value="Coding">Coding</option>
                <option value="Dancing">Dancing</option>
                <option value="singing">Singing</option>
                <option value="Martialarts">Martial-arts</option>
            </select>
        </label>
        <br>
        <label for="age">
            Age :
            <input type="number" min="18" max="70" placeholder="Enter age" required>
        </label>
        <br>
        <input type="submit" placeholder="Submit" align="center">
    </form>
    </div>

</body>
</html>
